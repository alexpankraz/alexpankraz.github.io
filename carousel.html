---
layout: page
title: LinkedIn Carousel Maker
permalink: /carousel/
---

<script src="https://cdn.tailwindcss.com"></script>
<style>
    /* Prevent Jekyll/Theme styles from leaking into our tool */
    #tool-body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    /* The Slide Preview Container */
    #previewContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        background: #e2e8f0;
        padding: 20px;
        border-radius: 12px;
        max-height: 80vh;
        overflow-y: auto;
    }

    /* The Individual Slide Logic */
    .slide-canvas {
        width: 500px; /* Scaled for preview */
        height: 500px;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        text-align: center;
        position: relative;
        overflow: hidden;
        border: none !important;
        outline: none !important;
        box-sizing: border-box !important;
        flex-shrink: 0;
    }

    /* Markdown Element Styling */
    .slide-content h1 { font-size: 3rem !important; font-weight: 800 !important; margin: 0 !important; line-height: 1.1 !important; }
    .slide-content p { font-size: 1.4rem !important; margin-top: 1rem !important; line-height: 1.4 !important; opacity: 0.9; }
    .slide-content ul { list-style: none !important; padding: 0 !important; font-size: 1.2rem !important; }
</style>

<div id="tool-body" class="not-prose bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Content (Markdown)</label>
                <textarea id="markdownInput" class="w-full h-80 p-4 border border-slate-300 rounded-xl font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
# Slide One
Welcome to my tool!
---
# Centered
Everything is automagically centered.
---
# PDF Export
Download and upload to LinkedIn!
                </textarea>
                <p class="text-xs text-slate-400 mt-2 italic">Use "---" on a new line to create a new slide.</p>
            </div>

            <div class="grid grid-cols-2 gap-4 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Background</label>
                    <input type="color" id="bgColor" value="#ffffff" class="w-full h-10 rounded cursor-pointer border-0">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Text Color</label>
                    <input type="color" id="textColor" value="#1e293b" class="w-full h-10 rounded cursor-pointer border-0">
                </div>
                <div class="col-span-2 flex items-center gap-3 pt-2">
                    <input type="checkbox" id="showPages" checked class="w-4 h-4 rounded">
                    <label for="showPages" class="text-sm font-semibold text-slate-700">Add Page Numbers & Progress Bar</label>
                </div>
            </div>

            <button onclick="downloadPDF()" id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                <span>Download LinkedIn PDF</span>
            </button>
        </div>

        <div id="previewContainer">
            </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

{% raw %}
<script>
    const input = document.getElementById('markdownInput');
    const bgColor = document.getElementById('bgColor');
    const textColor = document.getElementById('textColor');
    const showPages = document.getElementById('showPages');
    const preview = document.getElementById('previewContainer');

    function updateUI() {
        const slidesArr = input.value.split('---').map(s => s.trim());
        const total = slidesArr.length;
        preview.innerHTML = '';

        slidesArr.forEach((text, i) => {
            // Create Slide
            const slide = document.createElement('div');
            slide.className = "slide-canvas shadow-xl";
            slide.style.backgroundColor = bgColor.value;
            slide.id = `slide-target-${i}`;

            // Content
            const contentDiv = document.createElement('div');
            contentDiv.className = "slide-content p-10 w-full";
            contentDiv.style.color = textColor.value;
            contentDiv.innerHTML = marked.parse(text);
            slide.appendChild(contentDiv);

            // Page Indicator
            if (showPages.checked) {
                const num = document.createElement('div');
                num.className = "absolute bottom-6 right-8 text-sm font-bold opacity-60";
                num.style.color = textColor.value;
                num.innerText = `${i + 1} / ${total}`;
                slide.appendChild(num);

                const progressBase = document.createElement('div');
                progressBase.className = "absolute bottom-0 left-0 w-full h-1.5 bg-black/5";
                const progressBar = document.createElement('div');
                progressBar.className = "h-full bg-current opacity-40";
                progressBar.style.width = `${((i + 1) / total) * 100}%`;
                progressBar.style.color = textColor.value;
                progressBase.appendChild(progressBar);
                slide.appendChild(progressBase);
            }

            preview.appendChild(slide);
            
            // Recolor all headers/lists inside the slide
            slide.querySelectorAll('*').forEach(el => {
                if(!el.classList.contains('bg-black/5')) el.style.color = textColor.value;
            });
        });
    }

    async function downloadPDF() {
        const btn = document.getElementById('downloadBtn');
        btn.innerText = "Capturing...";
        btn.disabled = true;

        const { jsPDF } = window.jspdf;
        // Using 810pt (equivalent of 1080px)
        const pdf = new jsPDF('p', 'pt', [810, 810]);
        const slides = document.querySelectorAll('.slide-canvas');

        for (let i = 0; i < slides.length; i++) {
            if (i > 0) pdf.addPage([810, 810], 'p');

            const canvas = await html2canvas(slides[i], {
                scale: 3, // Upscale for sharpness
                useCORS: true,
                backgroundColor: bgColor.value,
                logging: false,
                width: 500,
                height: 500
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.92);
            
            /* THE BLEED FIX: 
               Placing image at -2, -2 and making it 814 wide 
               eliminates the OneDrive "white line" gap. */
            pdf.addImage(imgData, 'JPEG', -2, -2, 814, 814);
        }

        pdf.save('linkedin-carousel.pdf');
        btn.innerText = "Download LinkedIn PDF";
        btn.disabled = false;
    }

    [input, bgColor, textColor, showPages].forEach(el => el.addEventListener('input', updateUI));
    updateUI();
</script>
{% endraw %}
