<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Studio Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* This CSS handles the internal 1080px logic without external files */
        .slide-canvas {
            width: 1080px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Shrinks the 1080px slide so it fits on your mobile screen */
        .preview-scale {
            transform: scale(0.35); 
            transform-origin: top center;
            margin-bottom: -680px; 
        }

        /* The 'Magic' Centering that won't break on export */
        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            text-align: center;
            z-index: 10;
        }

        .slide-content h1 { font-size: 90px !important; font-weight: 900 !important; line-height: 1.1; margin-bottom: 40px; }
        .slide-content p { font-size: 45px !important; line-height: 1.4; }
        
        .page-num {
            position: absolute;
            bottom: 50px;
            right: 60px;
            font-size: 28px;
            font-weight: bold;
            opacity: 0.6;
        }

        #previewContainer {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <textarea id="markdownInput" class="w-full h-72 p-4 border rounded-2xl font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none">
img: 1
# Perfect Capture
This uses the "Tank" method to prevent cropping.
---
img: 2
# Stability
No extra CSS files needed.
---
bg: #1e293b
# The End
Ready for LinkedIn.
                </textarea>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <input type="file" id="imageUpload" accept="image/*" multiple class="block w-full text-sm mb-4">
                <div id="thumbTray" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="flex items-center gap-4 border-t pt-4">
                    <input type="color" id="textColor" value="#ffffff" class="w-10 h-10 rounded border-0 cursor-pointer">
                    <span class="text-sm font-bold text-slate-500">Global Text Color</span>
                </div>
            </div>

            <button onclick="downloadPDF()" id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg transition-transform active:scale-95 uppercase">
                Download Carousel PDF
            </button>
        </div>

        <div id="previewContainer" class="overflow-y-auto max-h-screen p-6 bg-slate-200 rounded-[2rem] border-2 border-slate-300">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const input = document.getElementById('markdownInput');
        const textColor = document.getElementById('textColor');
        const imageUpload = document.getElementById('imageUpload');
        const preview = document.getElementById('previewContainer');
        const thumbTray = document.getElementById('thumbTray');
        
        let gallery = [];

        imageUpload.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    gallery.push(ev.target.result);
                    renderThumbs();
                    updateUI();
                };
                reader.readAsDataURL(file);
            }
        });

        function renderThumbs() {
            thumbTray.innerHTML = gallery.map((img, i) => `
                <div class="relative w-12 h-12 border-2 border-blue-500 rounded overflow-hidden">
                    <img src="${img}" class="w-full h-full object-cover">
                    <span class="absolute top-0 left-0 bg-blue-500 text-white text-[10px] px-1 font-bold">${i+1}</span>
                </div>
            `).join('');
        }

        function updateUI() {
            const slidesArr = input.value.split('---').map(s => s.trim());
            preview.innerHTML = '';

            slidesArr.forEach((text, i) => {
                const imgMatch = text.match(/^img:\s*(\d+)/i);
                const bgMatch = text.match(/^bg:\s*([#\w\d]+)/i);
                
                let bgColor = "#334155";
                let bgImg = "";
                let cleanText = text;

                if (imgMatch && gallery[parseInt(imgMatch[1]) - 1]) {
                    bgImg = gallery[parseInt(imgMatch[1]) - 1];
                    cleanText = text.replace(/^img:\s*\d+\n?/, '');
                } else if (bgMatch) {
                    bgColor = bgMatch[1];
                    cleanText = text.replace(/^bg:\s*[#\w\d]+\n?/, '');
                }

                const wrapper = document.createElement('div');
                wrapper.className = "preview-scale";

                const slide = document.createElement('div');
                slide.className = "slide-canvas shadow-2xl mx-auto";
                slide.id = `slide-${i}`;
                slide.style.backgroundColor = bgColor;
                if (bgImg) slide.style.backgroundImage = `url(${bgImg})`;
                
                const content = document.createElement('div');
                content.className = "slide-content";
                content.style.color = textColor.value;
                content.innerHTML = marked.parse(cleanText);

                const num = document.createElement('div');
                num.className = "page-num";
                num.style.color = textColor.value;
                num.innerText = `${i+1}/${slidesArr.length}`;

                slide.appendChild(content);
                slide.appendChild(num);
                wrapper.appendChild(slide);
                preview.appendChild(wrapper);

                slide.querySelectorAll('*').forEach(el => el.style.color = textColor.value);
            });
        }

        async function downloadPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.innerText = "CAPTURING...";

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', [1080, 1080]);
            const slides = document.querySelectorAll('.slide-canvas');

            // Create invisible Tank to render clones
            const tank = document.createElement('div');
            tank.style.cssText = "position:absolute; top:-10000px; left:-10000px; width:1080px; height:1080px;";
            document.body.appendChild(tank);

            for (let i = 0; i < slides.length; i++) {
                btn.innerText = `SLIDE ${i+1}/${slides.length}...`;
                
                // Clone slide into the tank (resets transforms and visibility issues)
                const clone = slides[i].cloneNode(true);
                tank.appendChild(clone);

                if (i > 0) pdf.addPage([1080, 1080], 'p');

                const canvas = await html2canvas(clone, {
                    scale: 1,
                    useCORS: true,
                    width: 1080,
                    height: 1080
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                pdf.addImage(imgData, 'JPEG', 0, 0, 1080, 1080);
                
                tank.innerHTML = ''; // Flush clone
                canvas.width = 0; canvas.height = 0; // Clear memory
                await new Promise(r => setTimeout(r, 100));
            }

            pdf.save('carousel.pdf');
            document.body.removeChild(tank);
            btn.innerText = "Download Carousel PDF";
            btn.disabled = false;
        }

        [input, textColor].forEach(el => el.addEventListener('input', updateUI));
        updateUI();
    </script>
</body>
</html>
