<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Carousel Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slide-canvas {
            width: 500px;
            height: 500px;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: none !important;
            outline: none !important;
            box-sizing: border-box !important;
        }
        /* Markdown Styling */
        .slide-content h1 { font-size: 3rem !important; font-weight: 800 !important; margin: 0 !important; line-height: 1.1 !important; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .slide-content p { font-size: 1.4rem !important; margin-top: 1rem !important; opacity: 0.9; text-shadow: 0 1px 5px rgba(0,0,0,0.2); }
        
        /* Custom Scrollbar */
        #previewContainer::-webkit-scrollbar { width: 6px; }
        #previewContainer::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-4">1. Editor</h2>
                <textarea id="markdownInput" class="w-full h-80 p-4 border border-slate-300 rounded-xl font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-inner">
img: 1
# Slide One
Uses the first image in your tray!
---
img: 2
# Slide Two
Uses the second image.
---
bg: #1e293b
# Slide Three
I used a color override here.
---
# Slide Four
No command? Uses the global text color.
                </textarea>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                <h2 class="text-xl font-bold">2. Local Gallery</h2>
                <input type="file" id="imageUpload" accept="image/*" multiple class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                
                <div id="thumbTray" class="flex flex-wrap gap-2 mt-4">
                    </div>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Global Text Color</label>
                        <input type="color" id="textColor" value="#ffffff" class="w-full h-10 rounded cursor-pointer border-0">
                    </div>
                    <div class="flex items-end">
                        <button onclick="clearGallery()" class="text-xs text-red-500 font-bold hover:underline">Clear Gallery</button>
                    </div>
                </div>
            </div>

            <button onclick="downloadPDF()" id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 text-lg">
                GENERATE CAROUSEL PDF
            </button>
        </div>

        <div id="previewContainer" class="flex flex-col items-center gap-8 overflow-y-auto max-h-[90vh] p-8 bg-slate-200 rounded-2xl border-2 border-dashed border-slate-300">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const input = document.getElementById('markdownInput');
        const textColor = document.getElementById('textColor');
        const imageUpload = document.getElementById('imageUpload');
        const preview = document.getElementById('previewContainer');
        const thumbTray = document.getElementById('thumbTray');
        
        let gallery = [];

        // Handle File Uploads
        imageUpload.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const base64 = await toBase64(file);
                gallery.push(base64);
            }
            renderThumbnails();
            updateUI();
        });

        function toBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function renderThumbnails() {
            thumbTray.innerHTML = '';
            gallery.forEach((img, i) => {
                const wrap = document.createElement('div');
                wrap.className = "relative w-16 h-16 border-2 border-blue-500 rounded-lg overflow-hidden shadow-sm";
                wrap.innerHTML = `<img src="${img}" class="w-full h-full object-cover">
                                  <span class="absolute top-0 left-0 bg-blue-500 text-white text-[10px] px-1 font-bold">${i+1}</span>`;
                thumbTray.appendChild(wrap);
            });
        }

        function clearGallery() {
            gallery = [];
            imageUpload.value = '';
            renderThumbnails();
            updateUI();
        }

        function updateUI() {
            const slidesArr = input.value.split('---').map(s => s.trim());
            preview.innerHTML = '';

            slidesArr.forEach((text, i) => {
                const imgIndexMatch = text.match(/^img:\s*(\d+)/i);
                const bgMatch = text.match(/^bg:\s*([#\w\d]+)/i);
                
                let currentBgColor = "#334155"; // Default fallback
                let currentBgImage = "";
                let cleanText = text;

                if (imgIndexMatch) {
                    const idx = parseInt(imgIndexMatch[1]) - 1;
                    if (gallery[idx]) {
                        currentBgImage = gallery[idx];
                        cleanText = text.replace(/^img:\s*\d+\n?/, '');
                    }
                } else if (bgMatch) {
                    currentBgColor = bgMatch[1];
                    cleanText = text.replace(/^bg:\s*[#\w\d]+\n?/, '');
                }

                const slide = document.createElement('div');
                slide.className = "slide-canvas shadow-2xl bg-slate-800";
                slide.style.backgroundColor = currentBgColor;
                if (currentBgImage) {
                    slide.style.backgroundImage = `url(${currentBgImage})`;
                    slide.style.backgroundSize = "cover";
                    slide.style.backgroundPosition = "center";
                }
                slide.id = `slide-${i}`;
                slide.dataset.bg = currentBgColor;

                const content = document.createElement('div');
                content.className = "slide-content p-12 w-full z-10 drop-shadow-lg";
                content.style.color = textColor.value;
                content.innerHTML = marked.parse(cleanText);

                const num = document.createElement('div');
                num.className = "absolute bottom-6 right-8 text-sm font-black opacity-60";
                num.style.color = textColor.value;
                num.innerText = `${i+1} / ${slidesArr.length}`;

                slide.appendChild(content);
                slide.appendChild(num);
                preview.appendChild(slide);

                slide.querySelectorAll('*').forEach(el => el.style.color = textColor.value);
            });
        }

  async function downloadPDF() {
    const btn = document.getElementById('downloadBtn');
    const originalText = btn.innerText;
    btn.innerText = "CAPTURING SLIDES...";
    btn.disabled = true;

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'pt', [810, 810]);
        const slides = document.querySelectorAll('[id^="slide-"]');

        for (let i = 0; i < slides.length; i++) {
            btn.innerText = `PROCESSING SLIDE ${i + 1} of ${slides.length}...`;
            
            // 1. Move the slide into view temporarily (Fixes "Blank/Stuck" issue)
            slides[i].scrollIntoView();

            // 2. Add new page if not the first slide
            if (i > 0) pdf.addPage([810, 810], 'p');

            // 3. Capture with a slight delay to ensure UI is ready
            const canvas = await html2canvas(slides[i], {
                scale: 2, // Dropped to 2 to prevent memory crashes on mobile
                useCORS: true,
                backgroundColor: slides[i].dataset.bg || "#ffffff",
                logging: false, // Turn off logging to save performance
                width: 500,
                height: 500
            });

            // 4. Convert and add to PDF
            const imgData = canvas.toDataURL('image/jpeg', 0.9);
            pdf.addImage(imgData, 'JPEG', -2, -2, 814, 814);
            
            // Optional: small sleep to let the browser breathe
            await new Promise(r => setTimeout(r, 100)); 
        }

        pdf.save('carousel-studio.pdf');
    } catch (error) {
        console.error("PDF Generation failed:", error);
        alert("Something went wrong. Try reducing the number of slides or image sizes.");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

        [input, textColor].forEach(el => el.addEventListener('input', updateUI));
        updateUI();
    </script>
</body>
</html>
