<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Studio Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* THE STABLE CORE: Slides are ALWAYS 1080x1080 internally */
        .slide-canvas {
            width: 1080px;
            height: 1080px;
            position: relative;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            flex-shrink: 0;
            display: block; /* Avoid flexbox bugs during capture */
        }

        /* Scaled for your screen display only */
        .preview-scale {
            transform: scale(0.35); 
            transform-origin: top center;
            margin-bottom: -680px; 
        }

        .slide-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 920px;
            text-align: center;
            word-wrap: break-word;
            z-index: 10;
        }

        .slide-content h1 { font-size: 90px !important; font-weight: 900 !important; line-height: 1.1; margin-bottom: 40px; }
        .slide-content p { font-size: 45px !important; line-height: 1.4; font-weight: 500; }
        .drop-shadow { text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .page-num {
            position: absolute;
            bottom: 50px;
            right: 60px;
            font-size: 28px;
            font-weight: bold;
            opacity: 0.7;
            z-index: 20;
        }

        #previewContainer::-webkit-scrollbar { width: 8px; }
        #previewContainer::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-900">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <h2 class="text-lg font-black mb-3 text-blue-600 uppercase tracking-widest">1. Content</h2>
                <textarea id="markdownInput" class="w-full h-64 p-4 border border-slate-200 rounded-2xl font-mono text-sm outline-none focus:ring-4 focus:ring-blue-100 transition-all">
img: 1
# Local Image
Reference your tray by number!
---
img: 2
# Second Photo
Perfect for branding.
---
bg: #1e293b
# Color Slide
Just use bg: [color]
                </textarea>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200 space-y-4">
                <h2 class="text-lg font-black mb-1 text-blue-600 uppercase tracking-widest">2. Image Tray</h2>
                <input type="file" id="imageUpload" accept="image/*" multiple class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                
                <div id="thumbTray" class="flex flex-wrap gap-2 min-h-[50px] p-2 bg-slate-50 rounded-xl"></div>

                <div class="flex gap-6 items-center border-t pt-4">
                    <div class="flex flex-col items-center">
                        <input type="color" id="textColor" value="#ffffff" class="w-12 h-12 border-0 bg-transparent cursor-pointer">
                        <span class="text-[10px] font-bold mt-1 uppercase text-slate-400">Text</span>
                    </div>
                </div>
            </div>

            <button onclick="downloadPDF()" id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-6 rounded-3xl shadow-2xl transition-all active:scale-95 text-xl uppercase tracking-tighter">
                Export LinkedIn PDF
            </button>
        </div>

        <div id="previewContainer" class="overflow-y-auto max-h-[90vh] bg-slate-200 p-8 rounded-[3rem] border-4 border-white shadow-inner">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const input = document.getElementById('markdownInput');
        const textColor = document.getElementById('textColor');
        const imageUpload = document.getElementById('imageUpload');
        const preview = document.getElementById('previewContainer');
        const thumbTray = document.getElementById('thumbTray');
        
        let gallery = [];

        imageUpload.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    gallery.push(ev.target.result);
                    renderThumbs();
                    updateUI();
                };
                reader.readAsDataURL(file);
            }
        });

        function renderThumbs() {
            thumbTray.innerHTML = gallery.map((img, i) => `
                <div class="relative w-14 h-14 border-2 border-blue-400 rounded-lg overflow-hidden shadow-md">
                    <img src="${img}" class="w-full h-full object-cover">
                    <span class="absolute top-0 left-0 bg-blue-500 text-white text-[10px] px-1 font-bold rounded-br">${i+1}</span>
                </div>
            `).join('');
        }

        function updateUI() {
            const slidesArr = input.value.split('---').map(s => s.trim());
            preview.innerHTML = '';

            slidesArr.forEach((text, i) => {
                const imgMatch = text.match(/^img:\s*(\d+)/i);
                const bgMatch = text.match(/^bg:\s*([#\w\d]+)/i);
                
                let bgColor = "#334155";
                let bgImg = "";
                let cleanText = text;

                if (imgMatch && gallery[parseInt(imgMatch[1]) - 1]) {
                    bgImg = gallery[parseInt(imgMatch[1]) - 1];
                    cleanText = text.replace(/^img:\s*\d+\n?/, '');
                } else if (bgMatch) {
                    bgColor = bgMatch[1];
                    cleanText = text.replace(/^bg:\s*[#\w\d]+\n?/, '');
                }

                const wrapper = document.createElement('div');
                wrapper.className = "preview-scale";

                const slide = document.createElement('div');
                slide.className = "slide-canvas shadow-2xl mx-auto rounded-none";
                slide.id = `slide-${i}`;
                slide.style.backgroundColor = bgColor;
                if (bgImg) slide.style.backgroundImage = `url(${bgImg})`;
                
                const content = document.createElement('div');
                content.className = "slide-content " + (bgImg ? "drop-shadow" : "");
                content.style.color = textColor.value;
                content.innerHTML = marked.parse(cleanText);

                const num = document.createElement('div');
                num.className = "page-num";
                num.style.color = textColor.value;
                num.innerText = `${i+1}/${slidesArr.length}`;

                slide.appendChild(content);
                slide.appendChild(num);
                wrapper.appendChild(slide);
                preview.appendChild(wrapper);
                
                slide.querySelectorAll('*').forEach(el => el.style.color = textColor.value);
            });
        }

        async function downloadPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', [1080, 1080]);
            const slides = document.querySelectorAll('.slide-canvas');

            for (let i = 0; i < slides.length; i++) {
                btn.innerText = `EXPORTING ${i+1}/${slides.length}...`;
                if (i > 0) pdf.addPage([1080, 1080], 'p');

                const canvas = await html2canvas(slides[i], {
                    scale: 1, // Fixed 1080 rendering
                    useCORS: true,
                    logging: false,
                    width: 1080, height: 1080
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                pdf.addImage(imgData, 'JPEG', 0, 0, 1080, 1080);
                
                canvas.width = 0; canvas.height = 0; // Clear memory
                await new Promise(r => setTimeout(r, 150));
            }

            pdf.save('carousel-stable.pdf');
            btn.innerText = "Export LinkedIn PDF";
            btn.disabled = false;
        }

        [input, textColor].forEach(el => el.addEventListener('input', updateUI));
        updateUI();
    </script>
</body>
</html>
